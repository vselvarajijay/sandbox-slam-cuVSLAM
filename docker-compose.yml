# PyCuVSLAM + cuVSLAM on DGX Spark (aarch64, CUDA 13, GB10).
# Requires: ./cuVSLAM from scripts/clone_cuvslam.sh, then: docker compose build
services:
  cuvslam:
    image: pycuvslam:realsense-cu13
    build:
      context: ./cuVSLAM
      dockerfile: docker/Dockerfile.realsense-cu13
    privileged: true
    network_mode: host
    gpus: all
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./cuVSLAM:/cuvslam
      # Match host and container paths (same as scripts/run_cuvslam_docker.sh)
      - ${DATASETS_DIR:-${HOME}/datasets}:${DATASETS_DIR:-${HOME}/datasets}
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/bus/usb:/dev/bus/usb
    working_dir: /cuvslam
    stdin_open: true
    tty: true
    # Optional: add video devices in override file if you use a USB camera, e.g.:
    # devices: [ "/dev/video0:/dev/video0" ]
