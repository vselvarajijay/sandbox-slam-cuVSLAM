# Jetson Orin + Luxonis OAK-D (depthai, Rerun gRPC on by default in the image).
# Build: docker compose -f docker-compose.orin-oakd.yml build
# Run:  docker compose -f docker-compose.orin-oakd.yml run --rm cuvslam
#        (default command: python3 examples/oak-d/run_stereo.py — override with: ... run --rm cuvslam bash)
services:
  cuvslam:
    image: pycuvslam:orin-oakd
    build:
      context: ./cuVSLAM
      dockerfile: docker/Dockerfile.orin-oakd
    privileged: true
    network_mode: host
    gpus: all
    environment:
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_DISABLE_REQUIRE=${NVIDIA_DISABLE_REQUIRE:-1}
      - RERUN_SERVE_GRPC=${RERUN_SERVE_GRPC:-1}
      - RERUN_GRPC_PORT=${RERUN_GRPC_PORT:-9876}
      - RERUN_SERVE_GRPC_HINT_IP=${RERUN_SERVE_GRPC_HINT_IP:-}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
    volumes:
      - ./cuVSLAM:/cuvslam
      - ${DATASETS_DIR:-${HOME}/datasets}:${DATASETS_DIR:-${HOME}/datasets}
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev/bus/usb:/dev/bus/usb
    working_dir: /cuvslam
    command: ["python3", "examples/oak-d/run_stereo.py"]
    stdin_open: true
    tty: true
